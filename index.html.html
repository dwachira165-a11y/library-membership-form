<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Membership Form</title>
    <style>
   
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #844848;
      border-radius: 16px;
      border: 1px solid #cfbc2d;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 560px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #ebebeb;
    }

    .icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: #E6F1FB;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .card-header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a18;
    }

    .card-header p {
      font-size: 13px;
      color: #6b6b66;
      margin-top: 3px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #9b9a94;
      margin: 1.5rem 0 0.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid #ebebeb;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #6b6b66;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .req { color: #c0392b; margin-left: 3px; }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid #d0cfc8;
      border-radius: 8px;
      background: #fafaf8;
      color: #1a1a18;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #378add;
      box-shadow: 0 0 0 3px rgba(55,138,221,0.12);
    }

    input.invalid { border-color: #c0392b; }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border: 1px solid #d0cfc8;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      color: #1a1a18;
      background: #fff;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .pill:has(input:checked) {
      background: #E6F1FB;
      border-color: #378add;
      color: #0C447C;
    }

    .pill input {
      width: 14px;
      height: 14px;
      accent-color: #378add;
      margin: 0;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 1.75rem;
    }

    .btn-submit {
      flex: 1;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      background: #378add;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-submit:hover { background: #2a72c3; }

    .btn-reset {
      padding: 10px 20px;
      font-size: 14px;
      font-family: inherit;
      background: transparent;
      color: #6b6b66;
      border: 1px solid #d0cfc8;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-reset:hover { background: #f4f4f0; }

    .err {
      font-size: 12px;
      color: #c0392b;
      margin-top: 4px;
      display: none;
    }

    .success-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: #EAF3DE;
      border: 1px solid #639922;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 1rem;
      font-size: 14px;
      color: #27500A;
    }
  </style>     
    </style>
</head>
<body>
    <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="icon-wrap"></div>
      <div>
        <h1>Library Membership Application</h1>
        <p>Fill in the form below to apply for a membership</p>
      </div>
    </div>

    <!-- Form -->
    <form id="libForm" novalidate>

      <p class="section-label">Personal Details</p>

      <!-- Row 1: Name + Email -->
      <div class="row">
        <div class="field">
          <label for="fullname">Full Name <span class="req">*</span></label>
          <input type="text" id="fullname" placeholder="e.g. David Wachira" />
          <div class="err" id="fullname-err">Full name is required.</div>
        </div>
        <div class="field">
          <label for="email">Email Address <span class="req">*</span></label>
          <input type="email" id="email" placeholder="dave@xample.com" />
          <div class="err" id="email-err">A valid email is required.</div>
        </div>
      </div>

      <!-- Row 2: Phone + Country -->
      <div class="row">
        <div class="field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+254 700 000 000" />
        </div>
        <div class="field">
          <label for="country">Country</label>
          <select id="country">
            <option value="">— Select country —</option>
            <option>Kenya</option>
            <option>Uganda</option>
            <option>Tanzania</option>
            <option>Nigeria</option>
            <option>South Africa</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <p class="section-label">Membership Preferences</p>

      <!-- Membership Type -->
      <div class="field">
        <label>Membership Type</label>
        <div class="pill-group" role="radiogroup">
          <label class="pill">
            <input type="radio" name="membership" value="Student" checked />
             Student
          </label>
          <label class="pill">
            <input type="radio" name="membership" value="Staff" />
             Staff
          </label>
          <label class="pill">
            <input type="radio" name="membership" value="Public" />
             Public
          </label>
        </div>
      </div>

      <!-- Preferred Genres -->
      <div class="field" style="margin-top: 0.75rem;">
        <label>Preferred Genres</label>
        <div class="pill-group" role="group">
          <label class="pill">
            <input type="checkbox" name="genre" value="Fiction" />
             Fiction
          </label>
          <label class="pill">
            <input type="checkbox" name="genre" value="Science" />
             Science
          </label>
          <label class="pill">
            <input type="checkbox" name="genre" value="History" />
            History
          </label>
        </div>
      </div>

      <!-- Comments -->
      <div class="field" style="margin-top: 0.75rem;">
        <label for="comments">Comments</label>
        <textarea id="comments" placeholder="Any additional information or requests..."></textarea>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button type="submit" class="btn-submit">Submit Application</button>
        <button type="reset" class="btn-reset">Reset</button>
      </div>

      <!-- Success message -->
      <div class="success-banner" id="successBanner">
        ✅ Application submitted! We'll be in touch shortly.
      </div>

    </form>

  </div>
  <script>
    const form = document.getElementById('libForm');
    const banner = document.getElementById('successBanner');

    function showErr(id, show) {
      document.getElementById(id + '-err').style.display = show ? 'block' : 'none';
      document.getElementById(id).classList.toggle('invalid', show);
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      banner.style.display = 'none';
      let valid = true;

      const name = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      showErr('fullname', !name);
      if (!name) valid = false;

      showErr('email', !emailRx.test(email));
      if (!emailRx.test(email)) valid = false;

      if (valid) {
        banner.style.display = 'flex';
        banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    });

    form.addEventListener('reset', function() {
      banner.style.display = 'none';
      ['fullname', 'email'].forEach(id => showErr(id, false));
    });

    ['fullname', 'email'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        showErr(id, false);
      });
    });
  </script>
</body>
</html>
